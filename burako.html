<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burako Arcade</title>
    <link rel="icon" type="image/png" href="img/hub.png">
    <link rel="apple-touch-icon" href="img/hub.png">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/burako.css?v=1.2">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0c29">

    <script>
        if (("standalone" in window.navigator) && window.navigator.standalone) {
            document.addEventListener('click', function(event) {
                var a = event.target.closest('a');
                if (a && a.href && !a.href.startsWith('http')) {
                    event.preventDefault();
                    window.location = a.href;
                }
            }, false);
        }
    </script>
</head>
<body>
    <a href="index.html" class="btn-back-hub">⬅ Hub</a>

    <div id="game-container">
        <div class="logo-container">
            <img src="img/burako.png" alt="Burako Arcade" class="arcade-logo">
        </div>

        <div id="start-screen">
            <h2 style="color: var(--neon-gold); text-align: center; margin-bottom: 20px;">SALA DE ESPERA</h2>
            <input type="text" id="my-name" placeholder="Tu Nombre" style="margin-bottom: 15px; width: 100%; padding: 10px;">
            
            <label style="color: var(--neon-green); font-size: 0.9rem; display: block; margin-bottom: 5px; text-align: left;">Puntaje para ganar:</label>
            <select id="target-score" style="margin-bottom: 20px; width: 100%; padding: 10px; background: #111; color: var(--neon-gold); border: 2px solid var(--neon-green); border-radius: 5px; font-family: monospace; font-size: 1rem;">
                <option value="2000">2000 Puntos (Rápida)</option>
                <option value="3000" selected>3000 Puntos (Clásico)</option>
                <option value="4000">4000 Puntos</option>
                <option value="5000">5000 Puntos (Maratón)</option>
            </select>

            <button id="btn-crear-sala" class="btn-success" style="width: 100%;">Crear Partida de Burako</button>
            
            <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
                <p style="color: var(--neon-green); text-align: center; margin-bottom: 10px;">Partidas Abiertas:</p>
                <div id="rooms-list"></div>
            </div>
        </div>

        <div id="mesa-burako" class="hidden">
            
            <div id="scoreboard" style="display: flex; justify-content: space-between; padding: 10px 20px; background: rgba(0,0,0,0.7); border: 2px solid var(--neon-gold); margin-bottom: 10px; border-radius: 8px; font-weight: bold; font-size: 1.1rem;">
                <div style="color: var(--neon-green);">HOST: <span id="score-host">0</span></div>
                <div style="color: white; font-size: 0.9rem; opacity: 0.8; padding-top: 3px;">META: <span id="score-target">3000</span></div>
                <div style="color: #ff3333;">GUEST: <span id="score-guest">0</span></div>
            </div>

            <div id="zona-rival" class="atril-rival">
                <p class="nombre-jugador">Rival (Esperando...)</p>
            </div>

            <div id="zona-central">
                <div class="panel-robo">
                    <div id="pozo" class="ficha reverso">Pozo</div>
                    <div id="descarte" class="espacio-vacio">Descarte</div>
                </div>
                <div id="juegos-bajados">
                    <p style="color: rgba(0, 255, 255, 0.5); text-align: center; width: 100%; font-family: monospace;">[ ZONA DE CANASTAS ]</p>
                </div>
            </div>

            <div id="zona-jugador">
                <p class="nombre-jugador">Tu Atril</p>
                <div id="mi-atril" class="atril"></div>
                <div class="controles">
                    <button id="btn-bajar-juego" class="btn-success">Bajar Juego</button>
                    <button id="btn-descartar" class="danger">Descartar</button>
                </div>
            </div>
        </div>
        
        <p class="game-version">v2.2</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script src="js/burakoLogic.js?v=1.2"></script>
</body>
</html>
