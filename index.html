<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Juegos</title>
    <link rel="stylesheet" href="css/hub.css">
    <link rel="icon" type="image/png" href="img/hub.png">
    <link rel="apple-touch-icon" href="img/hub.png">
</head>
<body>

    <div class="hub-container">
        <header>
            <h1 class="glitch" data-text="HUB UNIVERSITARIO">HUB DE JUEGOS</h1>
            <p>Selecciona un juego para comenzar la partida</p>
        </header>

        <div class="games-grid">
            <a href="tuttifrutti.html" class="game-card tf-card">
                <div class="card-icon">✍️</div>
                <h2>Tutti Frutti</h2>
                <p>El clásico desafío de palabras, velocidad y VAR.</p>
                <span class="btn-play">Jugar Ahora</span>
            </a>

            <a href="burako.html" class="game-card bk-card">
                <div class="card-icon">🃏</div>
                <h2>Burako</h2>
                <p>Arma piernas, escaleras y canastas</p>
                <span class="btn-play">Jugar Ahora</span>
            </a>
        </div>
        
        <footer>
            <p>Versión 2.2 - Desarrollado para jugar con Gordito</p>
        </footer>
    </div>

</body>
</html>
